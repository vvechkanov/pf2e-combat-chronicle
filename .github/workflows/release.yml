name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Update module.json version and download URL
        run: |
          jq \
            --arg version "${{ steps.version.outputs.version }}" \
            --arg download "https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/module.zip" \
            '.version = $version | .download = $download' \
            module.json > module.json.tmp && mv module.json.tmp module.json

      - name: Create module.zip
        run: |
          zip -r module.zip \
            module.json \
            scripts/ \
            styles/ \
            lang/ \
            LICENSE \
            README.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            module.json
            module.zip
          generate_release_notes: true
